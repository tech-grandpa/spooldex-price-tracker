services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: spooldex_tracker
      POSTGRES_USER: spooldex
      POSTGRES_PASSWORD: spooldex
    volumes:
      - spooldex_tracker_db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spooldex -d spooldex_tracker"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${SPOOLDEX_REPO_PATH}:${SPOOLDEX_REPO_PATH}:ro
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${SPOOLDEX_REPO_PATH}:${SPOOLDEX_REPO_PATH}:ro
    command: ["npm", "run", "worker"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  spooldex_tracker_db:
